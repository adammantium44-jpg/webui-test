<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enxy AI - Stable Diffusion UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-generate { background: linear-gradient(45deg, #6a11cb 0%, #2575fc 100%); border: none; font-weight: bold; }
        .btn-generate:disabled { background: #444; }
        #imageContainer { min-height: 300px; display: flex; align-items: center; justify-content: center; border: 2px dashed #333; border-radius: 10px; }
        img { max-width: 100%; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold text-white">EN<span class="text-primary">XY</span> AI</h1>
        <p class="lead">Custom Stable Diffusion Web Interface</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card main-card p-4">
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">API URL (Ngrok)</label>
                    <input type="text" id="apiUrl" class="form-control bg-dark text-white border-secondary" placeholder="https://xxxx-xxxx.ngrok-free.app">
                    <div class="form-text text-muted">Masukkan URL Ngrok dari Kaggle/Colab kamu.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Prompt</label>
                    <textarea id="promptInput" class="form-control bg-dark text-white border-secondary" rows="3" placeholder="Describe the image you want..."></textarea>
                </div>

                <button id="genBtn" onclick="generate()" class="btn btn-generate btn-lg w-100 text-white mb-4">GENERATE IMAGE</button>

                <div id="imageContainer">
                    <div id="loader" class="spinner-border text-primary d-none" role="status"></div>
                    <img id="resultImg" src="" class="d-none">
                    <span id="placeholderText" class="text-muted">Hasil gambar akan muncul di sini</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function generate() {
        const apiUrl = document.getElementById('apiUrl').value;
        const prompt = document.getElementById('promptInput').value;
        const btn = document.getElementById('genBtn');
        const loader = document.getElementById('loader');
        const resultImg = document.getElementById('resultImg');
        const placeholder = document.getElementById('placeholderText');

        if(!apiUrl) return alert("Isi URL API Ngrok dulu bos!");
        if(!prompt) return alert("Prompt jangan kosong!");

        // UI State: Loading
        btn.disabled = true;
        loader.classList.remove('d-none');
        resultImg.classList.add('d-none');
        placeholder.classList.add('d-none');

        try {
            const response = await fetch(`${apiUrl}/generate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });

            const data = await response.json();
            
            // Tampilkan Gambar
            resultImg.src = "data:image/png;base64," + data.image;
            resultImg.classList.remove('d-none');
            loader.classList.add('d-none');
        } catch (error) {
            console.error(error);
            alert("Error: Pastikan URL Ngrok benar dan API sudah jalan!");
            loader.classList.add('d-none');
            placeholder.classList.remove('d-none');
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
